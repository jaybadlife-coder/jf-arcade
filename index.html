<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">
    
    <link rel="stylesheet" href="style.css">
    <title>J&F ULTIMATE CONSOLE</title>
</head>
<body id="app-body">
    <div class="scanlines"></div>

    <div id="fs-overlay" class="overlay-full">
        <div class="splash-content">
            <h1 class="arcade-title blink">J&F CONSOLE</h1>
            <div id="login-zone" class="login-card">
                <input type="password" id="access-key" placeholder="IDENTIFY (J OR F)..." maxlength="10">
                <button onclick="window.checkAccess()" class="arcade-btn love-btn-style">INSERT COIN</button>
            </div>
            <div id="loading-bar-container" style="display:none;">
                <p class="loading-text">SYNCING DATA...</p>
                <div class="load-border"><div id="load-fill"></div></div>
            </div>
            <p id="error-msg" class="error-text" style="display:none">⚠️ ACCESS DENIED</p>
        </div>
    </div>

    <main class="arcade-cabinet">
        <header class="marquee">
            <div class="logo-glow">JUSTINE 💖 FRANCINE</div>
        </header>

        <div class="screen-border">
            <div class="screen">
                <div id="notif-banner" class="hidden-notif"></div>
                
                <div class="top-hud">
                    <div class="hud-item">👤 <span id="my-name-display">---</span></div>
                    <div class="hud-item">🍪 <span id="cookie-count">0000</span></div>
                </div>

                <div class="leaderboard-bar">
                    <div class="score-tag justine-color">JUSTINE: <span id="score-justine">0</span></div>
                    <div class="score-divider">|</div>
                    <div class="score-tag francine-color">FRANCINE: <span id="score-francine">0</span></div>
                </div>

                <div id="pet-area">
                    <div id="pet-display" class="bounce">🥚</div>
                    <div class="pet-stats-card">
                        <p id="pet-name-label" class="pet-name-tag">MYSTIC EGG</p>
                        <div class="xp-bar-outline">
                            <div id="progress-fill"></div>
                        </div>
                        <div id="xp-text-label">XP: <span id="current-xp">0</span> / 5000</div>
                    </div>
                </div>
                
                <div class="status-zone">
                    <div id="partner-status" class="status-pill">
                        <span id="status-dot"></span> <span id="partner-name">SYNCING...</span>
                    </div>
                </div>

                <div class="interaction-layer">
                    <button class="arcade-btn feed-btn-style" id="feed-btn">FEED</button>
                    <button class="arcade-btn love-btn-style" id="love-btn">POKE</button>
                </div>
            </div>
        </div>

        <section class="control-panel">
            <div class="grid-header">SELECT CHALLENGE</div>
            <div class="scrollable-grid">
                <button class="game-btn" onclick="window.requestGame('tap')">👆 TAP</button>
                <button class="game-btn" onclick="window.requestGame('math')">🔢 MATH</button>
                <button class="game-btn" onclick="window.requestGame('match')">🎨 MATCH</button>
                <button class="game-btn" onclick="window.requestGame('lucky')">🎲 LUCKY</button>
                <button class="game-btn" onclick="window.requestGame('reaction')">⚡ REACT</button>
                <button class="game-btn" onclick="window.requestGame('brick')">🧱 BRICK</button>
                <button class="game-btn" onclick="window.requestGame('snake')">🐍 SNAKE</button>
                <button class="game-btn" onclick="window.requestGame('memory')">🧠 MEMORY</button>
                <button class="game-btn" onclick="window.requestGame('avoid')">🚀 AVOID</button>
                <button class="game-btn" onclick="window.requestGame('hilo')">⚖️ HI-LO</button>
                <button class="game-btn" onclick="window.requestGame('type')">⌨️ TYPE</button>
                <button class="game-btn" onclick="window.requestGame('emoji')">🔍 EMOJI</button>
                <button class="game-btn" onclick="window.requestGame('coin')">🪙 COIN</button>
                <button class="game-btn" onclick="window.requestGame('draw')">✏️ DRAW</button>
                <button class="game-btn" onclick="window.requestGame('word')">🔠 WORD</button>
            </div>

            <footer class="footer-btns">
                <button onclick="window.openGift()" class="util-btn gift-btn">🎁 GIFT</button>
                <button onclick="window.openDex()" class="util-btn">🐾 DEX</button>
                <button onclick="window.logout()" class="util-btn logout-btn">🚪 OUT</button>
            </footer>
        </section>
    </main>

    <div id="game-overlay" class="overlay">
        <div class="game-modal">
            <h2 id="game-title">VOTE DIFFICULTY</h2>
            <div id="game-screen"></div>
            <button class="util-btn" onclick="window.requestCloseGame()">EXIT</button>
        </div>
    </div>

    <div id="dex-overlay" class="overlay">
        <div class="game-modal">
            <h2>PET COLLECTION</h2>
            <p>ULTRA RARES: <span id="rare-count">0</span>/5</p>
            <div id="pet-grid" class="pet-grid-container"></div>
            <button class="util-btn" onclick="window.closeDex()">BACK</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
