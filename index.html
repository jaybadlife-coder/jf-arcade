<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ff00ff">
    <title>J&F SHARED CONSOLE</title>
</head>
<body id="app-body">
    
    <div class="scanlines"></div>

    <div id="fs-overlay">
        <div class="splash-content">
            <h1 class="arcade-title blink">J&F CONSOLE</h1>
            <p class="subtitle">EST. 2026 • SHARED PET EDITION</p>
            
            <div id="login-zone">
                <input type="password" id="access-key" placeholder="IDENTIFY (J OR F)...">
                <button onclick="checkAccess()" class="start-btn">INSERT COIN</button>
            </div>

            <div class="global-board">
                <h3>🏆 HALL OF FAME</h3>
                <div id="leaderboard-list">WAITING...</div>
            </div>
            <p id="error-msg" class="error-text" style="display:none; color: red;">ACCESS DENIED: J&F ONLY!</p>
        </div>
    </div>

    <div class="arcade-cabinet" id="main-cabinet">
        
        <div class="marquee">
            <div class="marquee-text logo-glow">JUSTINE 💖 FRANCINE</div>
        </div>

        <div class="screen-border">
            <div class="screen">
                <div id="notif-banner" class="hidden-notif"></div>

                <div class="top-hud">
                    <div class="hud-item">👤 <span id="my-name-display">---</span></div>
                    <div id="weather-display" class="weather-tag">☁️ LOADING...</div>
                    <div class="hud-item clickable" onclick="openDex()">🐾 <span id="pet-count">0</span></div>
                    <div class="hud-item">🍪 <span id="cookie-count">0000</span></div>
                </div>

                <div id="heart-container"></div>

                <div id="pet-area">
                    <div class="pet-shadow"></div>
                    <div id="pet-display" class="bounce">🥚</div>
                    <div id="zzz-container"></div> 
                    
                    <div class="pet-info">
                        <p id="pet-name-label" class="pet-name">OUR SHARED EGG</p>
                        <div class="xp-container">
                            <div class="xp-bar-container">
                                <div id="progress-fill"></div>
                            </div>
                            <div id="xp-text-label" style="font-size: 8px; color: var(--neon-blue); margin-top: 2px;">XP: 0 / 500</div>
                        </div>
                    </div>
                    <button id="ascend-btn" class="hidden-btn" onclick="ascendPet()">✨ EVOLVE NOW</button>
                </div>
                
                <div class="status-zone">
                    <div id="partner-status">SYNCING WITH PARTNER...</div>
                    <div class="streak-badge">
                        <span id="fire-l">🔥</span>
                        <span id="duo-streak-val">00</span>
                        <span id="fire-r">🔥</span>
                    </div>
                </div>

                <div class="daily-note-box">
                    <input type="text" id="daily-note-input" placeholder="Say something to Love..." maxlength="40">
                    <button onclick="saveNote()" class="note-send">SEND</button>
                </div>

                <div class="action-btns">
                    <button class="arcade-btn feed" id="feed-btn">FEED</button>
                    <button class="arcade-btn love" id="love-btn">POKE</button>
                </div>
            </div>
        </div>

        <div class="control-panel">
            <div class="joystick-grid">
                <button class="game-btn" onclick="openGame('tap')">TAP HERO</button>
                <button class="game-btn" onclick="openGame('math')">MATH PRO</button>
                <button class="game-btn" onclick="openGame('color')">MATCH IT</button>
                <button class="game-btn" onclick="openGame('guess')">LUCKY 3</button>
                <button class="game-btn" onclick="openGame('reflex')">REACTION</button>
            </div>
            
            <div class="footer-btns">
                <button onclick="sendGift()" class="util-btn">🎁 GIFT</button>
                <button onclick="openDex()" class="util-btn">🐾 DEX</button>
                <button onclick="toggleNightMode()" class="util-btn">🌓 MODE</button>
            </div>
        </div>
    </div>

    <div id="dex-overlay" class="overlay">
        <div class="arcade-modal">
            <h2 class="modal-title">OUR COLLECTION</h2>
            <div id="pet-grid" class="pet-grid-container"></div>
            <button class="close-modal-btn" onclick="closeDex()">CLOSE</button>
        </div>
    </div>

    <div id="game-overlay" class="overlay">
        <div class="arcade-modal game-modal">
            <h2 id="game-title">READY?</h2>
            <div id="game-screen"></div>
            <button class="close-modal-btn" onclick="closeGame()">QUIT</button>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
